<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="data-version" content="v0.0006">
<title>Pulse · 频道监控</title>
<style>
:root {
  --bg-page: #ffffff;
  --bg-surface: #f6f5f4;
  --bg-card: #ffffff;
  --bg-hover: #f6f5f4;
  --bg-modal: rgba(0,0,0,0.4);
  --text-primary: rgba(0,0,0,0.95);
  --text-secondary: #615d59;
  --text-tertiary: #a39e98;
  --border: rgba(0,0,0,0.1);
  --border-hover: rgba(0,0,0,0.18);
  --accent: #0075de;
  --accent-hover: #005bab;
  --accent-bg: #f2f9ff;
  --accent-text: #097fe8;
  --tag-ai-bg: #f2f9ff;
  --tag-ai-text: #0075de;
  --tag-company-bg: #fff3e6;
  --tag-company-text: #dd5b00;
  --tag-finance-bg: #e8fce8;
  --tag-finance-text: #1aae39;
  --tag-tech-bg: #f5f0ff;
  --tag-tech-text: #6941c6;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-toast: 0 4px 18px rgba(0,0,0,0.12);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-pill: 9999px;
  --font: Inter, -apple-system, system-ui, "Segoe UI", Helvetica, Arial, sans-serif;
  --font-mono: "SF Mono", ui-monospace, Menlo, monospace;
  /* card-specific: same as page in light mode */
  --card-bg: #ffffff;
  --card-text: rgba(0,0,0,0.95);
  --card-text-2: #615d59;
  --card-surface: #f6f5f4;
  --card-border: rgba(0,0,0,0.1);
  --card-border-hover: rgba(0,0,0,0.18);
  --card-shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  --card-shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
}
[data-theme="dark"] {
  --bg-page: #08090a;
  --bg-surface: #0f1011;
  --bg-card: #191a1b;
  --bg-hover: #28282c;
  --bg-modal: rgba(0,0,0,0.7);
  --text-primary: #f7f8f8;
  --text-secondary: #d0d6e0;
  --text-tertiary: #8a8f98;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --accent: #5e6ad2;
  --accent-hover: #7170ff;
  --accent-bg: rgba(94,106,210,0.15);
  --accent-text: #828fff;
  --tag-ai-bg: #f2f9ff;
  --tag-ai-text: #0075de;
  --tag-company-bg: #fff3e6;
  --tag-company-text: #dd5b00;
  --tag-finance-bg: #e8fce8;
  --tag-finance-text: #1aae39;
  --tag-tech-bg: #f5f0ff;
  --tag-tech-text: #6941c6;
  --shadow-card: 0 0 0 1px rgba(255,255,255,0.05);
  --shadow-card-hover: 0 0 0 1px rgba(255,255,255,0.1), 0 4px 12px rgba(0,0,0,0.3);
  --shadow-toast: 0 4px 18px rgba(0,0,0,0.4);
  /* cards go light on dark page */
  --card-bg: #ffffff;
  --card-text: rgba(0,0,0,0.92);
  --card-text-2: #5a5d63;
  --card-surface: #f5f5f7;
  --card-border: rgba(0,0,0,0.08);
  --card-border-hover: rgba(0,0,0,0.16);
  --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.03);
  --card-shadow-hover: 0 6px 20px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.75;
  transition: background 0.3s ease, color 0.3s ease;
  -webkit-font-smoothing: antialiased;
}
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg-page);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s ease;
}
[data-theme="dark"] .header { background: rgba(8,9,10,0.85); }
.header-inner {
  max-width: 960px; margin: 0 auto; padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--text-primary); }
.logo span { color: var(--accent); }
.logo-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #3dd68c;
  box-shadow: 0 0 8px #3dd68c;
  animation: pulse 2s ease-in-out infinite; flex-shrink: 0;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.header-actions { display: flex; align-items: center; gap: 8px; }
.search-box { position: relative; width: 240px; }
.search-box input {
  width: 100%; padding: 8px 12px 8px 36px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg-surface); color: var(--text-primary);
  font-size: 14px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,117,222,0.1); }
[data-theme="dark"] .search-box input:focus { box-shadow: 0 0 0 3px rgba(94,106,210,0.2); }
.search-box svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); }
.theme-toggle {
  width: 36px; height: 36px; border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg-surface); color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s;
}
.theme-toggle:hover { border-color: var(--border-hover); background: var(--bg-hover); }
.toolbar {
  max-width: 960px; margin: 0 auto; padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.filter-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-tag {
  padding: 6px 14px; border-radius: var(--radius-pill); border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.filter-tag:hover { border-color: var(--border-hover); background: var(--bg-surface); }
.filter-tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.meta-info { font-size: 13px; color: var(--text-tertiary); }
.meta-info strong { color: var(--text-primary); font-weight: 600; }
.sort-group { display: flex; gap: 4px; }
.sort-btn {
  padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: all 0.2s;
}
.sort-btn:hover { background: var(--bg-surface); }
.sort-btn.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }
.content { max-width: 1120px; margin: 0 auto; padding: 0 24px 80px; }
.card-grid { display: grid; grid-template-columns: repeat(3, 337px); gap: 20px; justify-content: center; }
@media (max-width: 1140px) {
  .card-grid { grid-template-columns: repeat(2, 337px); }
}
@media (max-width: 750px) {
  .card-grid { grid-template-columns: 337px; }
  .content { padding: 0 16px 80px; }
}
@media (max-width: 700px) {
  .header-inner { align-items: flex-start; gap: 12px; }
  .header-actions { flex: 1; justify-content: flex-end; min-width: 0; }
  .search-box { width: min(54vw, 240px); transition: width 0.2s ease; }
  .search-box:focus-within { width: min(68vw, 300px); }
  .header-inner, .toolbar { padding: 12px 16px; }
}
.mobile .card-cover { display: none; }
.card {
  background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius);
  overflow: hidden; transition: transform 0.2s ease, box-shadow 0.25s ease, border-color 0.2s;
  box-shadow: var(--card-shadow); width: 337px; display: flex; flex-direction: column;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--card-shadow-hover); border-color: var(--card-border-hover); }
.card-cover {
  height: 120px; background: var(--card-surface); display: flex; align-items: center;
  justify-content: center; font-size: 40px; border-bottom: 1px solid var(--card-border); position: relative;
}
.card-cover .hot-badge {
  position: absolute; top: 10px; right: 10px; background: rgba(255,90,79,0.9); color: #fff;
  font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: var(--radius-pill);
}
.card-body { padding: 16px; flex: 1; }
.card-tag {
  display: inline-block; padding: 3px 10px; border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 600; margin-bottom: 10px; letter-spacing: 0.02em;
}
.tag-ai { background: var(--tag-ai-bg); color: var(--tag-ai-text); }
.tag-company { background: var(--tag-company-bg); color: var(--tag-company-text); }
.tag-finance { background: var(--tag-finance-bg); color: var(--tag-finance-text); }
.tag-tech { background: var(--tag-tech-bg); color: var(--tag-tech-text); }
.card-title {
  font-size: 17px; font-weight: 700; line-height: 1.35; letter-spacing: -0.3px; margin-bottom: 8px;
  color: var(--card-text); display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card-excerpt {
  font-size: 13.5px; line-height: 1.65; color: var(--card-text-2); margin-bottom: 14px;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--text-tertiary);
}
.card-meta .time { font-family: var(--font-mono); font-size: 11px; color: var(--card-text-2); }
.card-meta .views { display: flex; align-items: center; gap: 4px; color: var(--card-text-2); }
.card-meta .views.hot { color: #ff5b4f; font-weight: 600; }
.card-source {
  margin-top: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
  color: var(--text-tertiary); font-size: 12px;
}
.card-source a { color: var(--accent-text); text-decoration: none; font-weight: 500; }
.card-source a:hover { text-decoration: underline; }
.card-actions { display: flex; gap: 6px; padding: 12px 16px; border-top: 1px solid var(--card-border); }
.card-actions button {
  flex: 1; padding: 7px 0; border: 1px solid var(--card-border); border-radius: var(--radius-sm);
  background: transparent; color: var(--card-text-2); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px;
}
.card-actions button:hover { background: var(--card-surface); border-color: var(--card-border-hover); transform: translateY(-1px); }
.card-actions .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.card-actions .btn-primary:hover { background: var(--accent-hover); }
@keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
.skeleton {
  background: linear-gradient(90deg, var(--card-surface) 25%, #e8e8eb 50%, var(--card-surface) 75%);
  background-size: 800px 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: var(--radius-sm);
}
.skeleton-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--card-shadow); width: 337px; }
.skeleton-cover { height: 120px; }
.skeleton-tag { width: 50px; height: 20px; margin: 16px 16px 0; }
.skeleton-title { width: 85%; height: 18px; margin: 12px 16px 0; }
.skeleton-text { width: 100%; height: 14px; margin: 12px 16px 0; }
.skeleton-text2 { width: 75%; height: 14px; margin: 6px 16px 0; }
.skeleton-meta { width: 40%; height: 12px; margin: 14px 16px 16px; }
.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--card-bg); color: var(--card-text); padding: 10px 20px;
  border-radius: var(--radius-pill); font-size: 13px; font-weight: 500;
  box-shadow: var(--card-shadow-hover); z-index: 9999; opacity: 0;
  transition: transform 0.3s ease, opacity 0.3s ease; pointer-events: none;
  border: 1px solid var(--card-border);
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.modal-overlay {
  position: fixed; inset: 0; background: var(--bg-modal); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px;
  width: 90%; max-width: 560px; max-height: 80vh; overflow-y: auto;
  transform: scale(0.95) translateY(10px); transition: transform 0.25s ease;
  box-shadow: 0 14px 28px rgba(0,0,0,0.15), 0 5px 10px rgba(0,0,0,0.08);
}
.modal-overlay.active .modal { transform: scale(1) translateY(0); }
.modal-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: var(--card-text); }
.modal-close {
  width: 32px; height: 32px; border: 1px solid var(--card-border); border-radius: var(--radius-sm);
  background: transparent; color: var(--card-text-2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.modal-close:hover { background: var(--card-surface); }
.modal-body { padding: 20px 24px; }
.info-section { margin-bottom: 16px; }
.info-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); margin-bottom: 6px; }
.info-value { font-size: 14px; line-height: 1.6; color: var(--card-text); }
.info-badge {
  display: inline-block; padding: 3px 10px; border-radius: var(--radius-pill); font-size: 12px;
  font-weight: 500; margin-right: 6px; margin-bottom: 4px; background: var(--card-surface);
  color: var(--card-text-2); border: 1px solid var(--card-border);
}
.info-points { list-style: none; counter-reset: point; }
.info-points li {
  counter-increment: point; padding: 6px 0 6px 32px; position: relative;
  font-size: 14px; line-height: 1.6; color: var(--card-text); border-bottom: 1px solid var(--card-border);
}
.info-points li:last-child { border-bottom: none; }
.info-points li::before {
  content: counter(point); position: absolute; left: 0; top: 6px; width: 22px; height: 22px;
  border-radius: 50%; background: var(--accent-bg); color: var(--accent-text);
  font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center;
}
.modal-footer { padding: 0 24px 20px; display: flex; gap: 8px; }
.modal-footer button {
  flex: 1; padding: 10px; border: 1px solid var(--card-border); border-radius: var(--radius-sm);
  background: transparent; color: var(--card-text-2); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.modal-footer button:hover { background: var(--card-surface); }
.modal-footer .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.modal-footer .btn-accent:hover { background: var(--accent-hover); }
.back-top {
  position: fixed; bottom: 32px; right: 32px; width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--card-border); background: var(--card-bg); color: var(--card-text-2);
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: var(--card-shadow); opacity: 0; transform: translateY(10px); transition: all 0.3s ease; z-index: 50;
}
.back-top.visible { opacity: 1; transform: translateY(0); }
.back-top:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.empty-state { text-align: center; padding: 80px 20px; color: var(--text-tertiary); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state .title { font-size: 16px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
.load-more {
  margin: 24px auto 0; min-width: 160px; padding: 10px 18px; border: 1px solid var(--card-border);
  border-radius: var(--radius-sm); background: var(--card-bg); color: var(--card-text-2);
  cursor: pointer; display: none; font-size: 13px; font-weight: 600; transition: all 0.2s; box-shadow: var(--card-shadow);
}
.load-more:hover { background: var(--card-surface); border-color: var(--card-border-hover); color: var(--card-text); }
.footer {
  margin-top: 40px; border-top: 1px solid var(--border);
  padding: 24px 0 32px;
}
.footer-inner {
  max-width: 1120px; margin: 0 auto; padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.footer-brand { display: flex; align-items: center; gap: 10px; }
.footer-logo {
  font-size: 14px; font-weight: 700; letter-spacing: -0.3px; color: var(--text-primary);
}
.footer-desc { font-size: 12px; color: var(--text-tertiary); }
.footer-meta { display: flex; align-items: center; gap: 16px; }
.footer-version {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary);
  background: var(--bg-surface); padding: 3px 10px; border-radius: var(--radius-pill);
  border: 1px solid var(--border);
}
@media (max-width: 700px) {
  .footer-inner { flex-direction: column; gap: 12px; text-align: center; padding: 0 16px; }
  .footer { padding: 20px 0 28px; }
}

/* Pagination */
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin: 32px 0;
  flex-wrap: wrap;
}
.pagination button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 36px;
  height: 36px;
  padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}
.pagination button:hover:not(:disabled):not(.active) {
  border-color: var(--accent);
  color: var(--accent);
}
.pagination button.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.pagination button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.pagination .dots {
  color: var(--text-tertiary);
  padding: 0 4px;
}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo"><div class="logo-dot"></div> <span>Pulse</span></div>
    <div class="header-actions">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="搜索消息..." aria-label="搜索消息">
      </div>
      <button class="theme-toggle" id="themeToggle" title="切换主题" aria-label="切换主题">☀️</button>
    </div>
  </div>
</header>
<div class="toolbar">
  <div class="filter-tags">
    <button class="filter-tag active" data-filter="all">全部</button>
    <button class="filter-tag" data-filter="AI">🤖 AI</button>
    <button class="filter-tag" data-filter="公司">🏢 公司</button>
    <button class="filter-tag" data-filter="金融">💰 金融</button>
    <button class="filter-tag" data-filter="科技">🔬 科技</button>
  </div>
  <div class="meta-info">显示 <strong id="visibleCount">0</strong> / <strong id="totalCount">0</strong> 条消息</div>
  <div class="sort-group">
    <button class="sort-btn active" data-sort="time">⏰ 时间</button>
    <button class="sort-btn" data-sort="hot">🔥 热度</button>
  </div>
</div>
<main class="content">
  <div class="card-grid" id="skeletons">
    <div class="skeleton-card"><div class="skeleton skeleton-cover"></div><div class="skeleton skeleton-tag"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text2"></div><div class="skeleton skeleton-meta"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-cover"></div><div class="skeleton skeleton-tag"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text2"></div><div class="skeleton skeleton-meta"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-cover"></div><div class="skeleton skeleton-tag"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text2"></div><div class="skeleton skeleton-meta"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-cover"></div><div class="skeleton skeleton-tag"></div><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text2"></div><div class="skeleton skeleton-meta"></div></div>
  </div>
  <div class="card-grid" id="cardGrid"></div>
  <div class="pagination" id="pagination"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">📭</div>
    <div class="title">暂无消息</div>
    <div class="desc">换个关键词试试？</div>
  </div>

function classify(text) {
  var t = (text || "").toLowerCase();
  if (/ai|gpt|claude|gemini|大模型|llm|智能体|机器人|openai|anthropic/.test(t)) return "AI";
  if (/公司|苹果|谷歌|微软|meta|腾讯|阿里|字节|小米|华为|coinbase/.test(t)) return "公司";
  if (/金融|银行|币|股|融资|投资|coin|crypto|bitcoin/.test(t)) return "金融";
  return "科技";
}

function parseViews(value) {
  var text = String(value || "0").trim().replace(/,/g, "");
  if (!text) return 0;
  var multiplier = 1, suffix = text.slice(-1).toUpperCase();
  if (suffix === "K") { multiplier = 1000; text = text.slice(0, -1); }
  else if (suffix === "M") { multiplier = 1000000; text = text.slice(0, -1); }
  var parsed = parseFloat(text);
  return Number.isFinite(parsed) ? Math.round(parsed * multiplier) : 0;
}

function formatViews(value) {
  var views = Number(value || 0);
  if (views >= 1000000) return (views / 1000000).toFixed(1).replace(/\.0$/, "") + "M";
  if (views >= 1000) return (views / 1000).toFixed(1).replace(/\.0$/, "") + "K";
  return String(views);
}

function formatTime(iso) {
  var d = new Date(iso), diff = (Date.now() - d) / 1000;
  if (Number.isNaN(d.getTime())) return "未知时间";
  if (diff < 3600) return Math.max(1, Math.floor(diff/60)) + "分钟前";
  if (diff < 86400) return Math.floor(diff/3600) + "小时前";
  if (diff < 172800) return "昨天";
  return d.toLocaleDateString("zh-CN", {month:"2-digit", day:"2-digit"});
}

    title: title,
    summary: summary,
    views_num: viewsNum,
    search_text_lower: (cleanText + " " + text + " " + (m.channel || "")).toLowerCase()
  });
}

function dataVersion() {
  var meta = document.querySelector('meta[name="data-version"]');
  return meta ? meta.getAttribute("content") : "";
}

(function showVersion() {
  var v = dataVersion();
  var el = document.getElementById("versionLabel");
  if (el) el.textContent = v || "—";
})();

function loadData() {
  try {
    var json = decodeURIComponent(escape(atob(_d)));
    var data = JSON.parse(json);
    allData = (data.messages || []).map(normalizeMessage);
    renderCards();
  } catch(e) {
    skeletonsEl.style.display = "none";
    cardGridEl.innerHTML = "";
    paginationEl.style.display = "none";
    totalCountEl.textContent = "0";
    visibleCountEl.textContent = "0";
    setEmptyState("noData");
  }
}

function applyFilters() {
  var items = allData.slice();
  var q = searchInput.value.trim().toLowerCase();
  if (currentFilter !== "all") items = items.filter(function(m) { return m.tag === currentFilter; });
  if (q) items = items.filter(function(m) { return m.search_text_lower.indexOf(q) >= 0; });
  if (currentSort === "hot") items.sort(function(a,b) {
    return b.views_num - a.views_num;
  });
  else items.sort(function(a,b) { return new Date(b.datetime || 0) - new Date(a.datetime || 0); });
  return items;
}

function renderCards(resetPage) {
  skeletonsEl.style.display = "none";
  if (resetPage) currentPage = 1;
  filteredData = applyFilters();
  totalCountEl.textContent = allData.length;
  visibleCountEl.textContent = filteredData.length;
  if (!allData.length) {
    cardGridEl.innerHTML = "";
    paginationEl.innerHTML = "";
    setEmptyState("noData");
    return;
  }
  if (!filteredData.length) {
    cardGridEl.innerHTML = "";
    paginationEl.innerHTML = "";
    setEmptyState("noResults");
    return;
  }
  emptyStateEl.style.display = "none";

  var totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  var start = (currentPage - 1) * PAGE_SIZE;
  var end = Math.min(start + PAGE_SIZE, filteredData.length);
  var items = filteredData.slice(start, end);

  var html = "";
  for (var i = 0; i < items.length; i++) {
    var m = items[i], idx = m._index;
    var views = m.views_num;
    var isHot = views >= 1000;
    var tag = m.tag, icon = getIcon(tag);
    var tagClass = "tag-" + (tag === "AI" ? "ai" : tag === "公司" ? "company" : tag === "金融" ? "finance" : "tech");
    html += '<article class="card">'
      + '<div class="card-cover">' + icon + (isHot ? '<span class="hot-badge">🔥 热门</span>' : '') + '</div>'
      + '<div class="card-body">'
      + '<span class="card-tag ' + tagClass + '">' + tag + '</span>'
      + '<h3 class="card-title">' + esc(m.title) + '</h3>'
      + '<p class="card-excerpt">' + esc(m.summary) + '</p>'
      + '<div class="card-meta"><span class="time">' + formatTime(m.datetime) + '</span>'
      + '<span class="views' + (isHot?' hot':'') + '">👁 ' + formatViews(views) + '</span></div>'
      + '</div>'
      + '<div class="card-actions">'
      + '<button onclick="copyFull(' + idx + ')" aria-label="复制全文">📋 复制</button>'
      + '<button onclick="copyTitle(' + idx + ')" aria-label="复制标题">📌 标题</button>'
      + '<button class="btn-primary" onclick="quickGen(' + idx + ')" aria-label="生成配图">🎨 生图</button>'
      + '</div></article>';
  }
  cardGridEl.innerHTML = html;
  
  // 渲染分页
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  if (totalPages <= 1) {
    paginationEl.innerHTML = "";
    return;
  }
  
  var html = '<button onclick="goPage(' + (currentPage - 1) + ')" ' + (currentPage <= 1 ? 'disabled' : '') + '>‹</button>';
  
  var startPage = Math.max(1, currentPage - 2);
  var endPage = Math.min(totalPages, currentPage + 2);
  
  if (startPage > 1) {
    html += '<button onclick="goPage(1)">1</button>';
    if (startPage > 2) html += '<span class="dots">...</span>';
  }
  
  for (var p = startPage; p <= endPage; p++) {
    html += '<button onclick="goPage(' + p + ')" class="' + (p === currentPage ? 'active' : '') + '">' + p + '</button>';
  }
  
  if (endPage < totalPages) {
    if (endPage < totalPages - 1) html += '<span class="dots">...</span>';
    html += '<button onclick="goPage(' + totalPages + ')">' + totalPages + '</button>';
  }
  
  html += '<button onclick="goPage(' + (currentPage + 1) + ')" ' + (currentPage >= totalPages ? 'disabled' : '') + '>›</button>';
  
  paginationEl.innerHTML = html;
}

function goPage(page) {
  var totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderCards(false);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyFull(i) {
  writeClipboard(allData[i].text || "", "已复制全文 ✅");
}

function copyTitle(i) {
  var m = allData[i];
  writeClipboard(m.title || "", "已复制标题 ✅");
}

function quickGen(i) {
  var m = allData[i];
  var content = m.clean_text || m.text || "";
  var entities = [];
  var p1 = /Anthropic|OpenAI|Meta|Google|Microsoft|Apple|小米|华为|腾讯|阿里|字节|Coinbase|Tesla|Samsung|三星|DeepSeek/g;
  var p2 = /GPT-[\w.]+|Claude|Gemini|Llama|Sora|DeepSeek/g;
  var m2;
  while ((m2 = p1.exec(content)) !== null) entities.push(m2[0]);
  while ((m2 = p2.exec(content)) !== null) entities.push(m2[0]);
  var unique = entities.filter(function(v, i, a) { return a.indexOf(v) === i; });
  var keywords = unique.join(", ") || m.tag;
  var title = m.title || content.slice(0, 60);
  window.open("https://chat.openai.com/?model=gpt-4&prompt=" + encodeURIComponent(
    "请根据以下描述生成一张配图：科技新闻配图，标题：" + title + "，关键词：" + keywords
  ), "_blank", "noopener,noreferrer");
  showToast("正在打开生图... 🎨");
}

function closeModal() {
  modalOverlay.classList.remove("active");
  if (lastTrigger && typeof lastTrigger.focus === "function") lastTrigger.focus();
}
modalClose.addEventListener("click", closeModal);
modalOverlay.addEventListener("click", function(e) { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape" && modalOverlay.classList.contains("active")) closeModal();
});

function writeClipboard(text, successMessage) {
  if (!navigator.clipboard || !navigator.clipboard.writeText) {
    showToast("当前浏览器不支持剪贴板 ❌");
    return;
  }
  navigator.clipboard.writeText(text).then(function() {
    showToast(successMessage);
  }).catch(function() {
    showToast("复制失败，请检查浏览器权限 ❌");
  });
}

function copyText(type) {
  if (!currentInfo) return;
  var text;
  if (type === "info") {
    text = "主体: " + currentInfo.tag + "\n标题: " + currentInfo.title + "\n实体: " + currentInfo.entities.join(", ") + "\n要点:\n" + currentInfo.points.map(function(p,i) { return (i+1) + ". " + p; }).join("\n");
  } else {
    text = "请生成一张科技新闻配图：\n标题：" + currentInfo.title + "\n关键词：" + currentInfo.entities.join(", ") + "\n风格：现代简约、科技感、深色背景";
  }
  writeClipboard(text, type === "info" ? "已复制信息 ✅" : "已复制提示词 ✅");
}

function generateImage() {
  if (!currentInfo) return;
  window.open("https://chat.openai.com/?model=gpt-4&prompt=" + encodeURIComponent("请根据以下描述生成一张配图：科技新闻配图，标题：" + currentInfo.title + "，关键词：" + currentInfo.entities.join(", ")), "_blank", "noopener,noreferrer");
  showToast("正在打开生图... 🎨");
}

document.querySelectorAll(".filter-tag").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".filter-tag").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    renderCards(true);
  });
});
document.querySelectorAll(".sort-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".sort-btn").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    currentSort = btn.dataset.sort;
    renderCards(true);
  });
});
searchInput.addEventListener("input", function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() { renderCards(true); }, 200);
});


var backTop = document.getElementById("backTop");
window.addEventListener("scroll", function() { backTop.classList.toggle("visible", window.scrollY > 400); });
backTop.addEventListener("click", function() { window.scrollTo({ top: 0, behavior: "smooth" }); });

loadData();
</script>
</body>
</html>
