<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse · 素材雷达</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08090a;
  --bg-panel: #0f1011;
  --bg-card: #131415;
  --bg-elevated: #1a1b1d;
  --bg-hover: #1f2023;
  --text: #f0f1f3;
  --text-2: #a0a4ab;
  --text-3: #6b7078;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --accent: #6e78d6;
  --accent-hover: #8b93ff;
  --accent-bg: rgba(110,120,214,0.12);
  --green: #3dd68c;
  --green-bg: rgba(61,214,140,0.1);
  --orange: #e8943a;
  --orange-bg: rgba(232,148,58,0.1);
  --red: #f06b5e;
  --red-bg: rgba(240,107,94,0.1);
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,0.1);
  --radius: 10px;
  --radius-lg: 14px;
  --font: 'Inter', -apple-system, system-ui, sans-serif;
  --mono: 'SF Mono', ui-monospace, Menlo, monospace;
  --card-shadow: 0 0 0 1px rgba(255,255,255,0.04);
  --card-shadow-hover: 0 0 0 1px rgba(255,255,255,0.08), 0 8px 24px rgba(0,0,0,0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* === HEADER === */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,9,10,0.82);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1100px; margin: 0 auto;
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 17px; font-weight: 700; letter-spacing: -0.4px;
  color: var(--text); text-decoration: none; white-space: nowrap;
}
.logo-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.logo span { color: var(--text-3); font-weight: 500; font-size: 14px; margin-left: 4px; }
.search-wrap {
  position: relative; flex: 1; max-width: 320px;
}
.search-wrap input {
  width: 100%; padding: 8px 12px 8px 34px;
  background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 13px; font-family: var(--font);
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input::placeholder { color: var(--text-3); }
.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(110,120,214,0.15);
}
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-3); pointer-events: none;
}

/* === TOOLBAR === */
.toolbar {
  max-width: 1100px; margin: 0 auto;
  padding: 16px 28px 0;
  display: flex; flex-direction: column; gap: 12px;
}
.stats-bar {
  display: flex; gap: 20px; flex-wrap: wrap;
}
.stat-item {
  font-size: 12px; color: var(--text-3); font-family: var(--mono);
}
.stat-item strong {
  color: var(--text-2); font-weight: 600; margin-left: 2px;
}
.filters { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.filter-btn {
  padding: 5px 13px; border-radius: 999px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-2); font-size: 12px; font-weight: 500; font-family: var(--font);
  cursor: pointer; transition: all 0.15s ease;
  display: flex; align-items: center; gap: 5px;
}
.filter-btn:hover { background: var(--bg-elevated); border-color: var(--border-hover); color: var(--text); }
.filter-btn.active {
  background: var(--accent-bg); border-color: var(--accent); color: var(--accent-hover);
}
.filter-btn .dot {
  width: 6px; height: 6px; border-radius: 50%;
}
.toolbar-right { display: flex; align-items: center; gap: 16px; }
.count { font-size: 12px; color: var(--text-3); font-family: var(--mono); }
.count strong { color: var(--text-2); font-weight: 600; }
.sort-group { display: flex; gap: 2px; }
.sort-btn {
  padding: 5px 10px; border-radius: 6px;
  border: 1px solid transparent; background: transparent;
  color: var(--text-3); font-size: 12px; font-weight: 500; font-family: var(--font);
  cursor: pointer; transition: all 0.15s;
}
.sort-btn:hover { color: var(--text-2); background: var(--bg-elevated); }
.sort-btn.active { color: var(--text); background: var(--bg-elevated); border-color: var(--border); }

/* === GRID === */
.content { max-width: 1100px; margin: 0 auto; padding: 20px 28px 100px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

/* === CARD === */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.25s ease, border-color 0.2s;
  box-shadow: var(--card-shadow);
  display: flex; flex-direction: column;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: var(--card-shadow-hover);
  border-color: var(--border-hover);
}
.card-top {
  padding: 20px 20px 0;
  display: flex; align-items: flex-start; gap: 12px;
}
.card-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.card-icon.ai { background: var(--accent-bg); color: var(--accent); }
.card-icon.company { background: var(--orange-bg); color: var(--orange); }
.card-icon.finance { background: var(--green-bg); color: var(--green); }
.card-icon.tech { background: var(--purple-bg); color: var(--purple); }
.card-header { flex: 1; min-width: 0; }
.card-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 999px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
  text-transform: uppercase; margin-bottom: 6px;
}
.card-tag.ai { background: var(--accent-bg); color: var(--accent); }
.card-tag.company { background: var(--orange-bg); color: var(--orange); }
.card-tag.finance { background: var(--green-bg); color: var(--green); }
.card-tag.tech { background: var(--purple-bg); color: var(--purple); }
.card-title {
  font-size: 15px; font-weight: 600; line-height: 1.4;
  letter-spacing: -0.2px; color: var(--text);
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card-summary {
  font-size: 12px; color: var(--accent); margin-top: 4px;
  display: -webkit-box; -webkit-line-clamp: 1;
  -webkit-box-orient: vertical; overflow: hidden;
  opacity: 0.85;
}
.hot-badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 7px; border-radius: 999px;
  background: var(--red-bg); color: var(--red);
  font-size: 10px; font-weight: 600; margin-left: 8px; white-space: nowrap;
}
.card-body { padding: 12px 20px 0; flex: 1; }
.card-excerpt {
  font-size: 13px; line-height: 1.65; color: var(--text-2);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card-footer {
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  margin-top: auto;
}
.card-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 11px; color: var(--text-3); font-family: var(--mono);
}
.card-meta .views { display: flex; align-items: center; gap: 4px; }
.card-meta .views.hot { color: var(--red); }
.card-actions { display: flex; gap: 4px; }
.card-actions button {
  padding: 5px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-3); font-size: 11px; font-weight: 500; font-family: var(--font);
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}
.card-actions button:hover {
  background: var(--bg-elevated); border-color: var(--border-hover); color: var(--text-2);
}
.card-actions .btn-accent {
  background: var(--accent-bg); border-color: transparent; color: var(--accent);
}
.card-actions .btn-accent:hover {
  background: rgba(110,120,214,0.2); color: var(--accent-hover);
}

/* === SKELETON === */
@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-hover) 50%, var(--bg-elevated) 75%);
  background-size: 800px 100%; animation: shimmer 1.5s ease-in-out infinite;
  border-radius: var(--radius-lg);
}
.skel-card {
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 20px; display: flex; flex-direction: column; gap: 12px;
}
.skel-row { display: flex; align-items: center; gap: 10px; }
.skel-circle { width: 36px; height: 36px; border-radius: 8px; }
.skel-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.skel-line { height: 12px; border-radius: 4px; }
.skel-line.w60 { width: 60%; }
.skel-line.w90 { width: 90%; }
.skel-line.w75 { width: 75%; }
.skel-line.w40 { width: 40%; }

/* === MODAL === */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 92%; max-width: 520px; max-height: 80vh;
  overflow-y: auto;
  transform: scale(0.96) translateY(8px);
  transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1);
  box-shadow: 0 24px 48px rgba(0,0,0,0.5);
}
.modal-overlay.active .modal { transform: scale(1) translateY(0); }
.modal-head {
  padding: 20px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-head h3 {
  font-size: 16px; font-weight: 600; letter-spacing: -0.2px;
  color: var(--text);
}
.modal-close {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-3); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--bg-elevated); color: var(--text-2); }
.modal-body { padding: 20px 24px; }
.info-section { margin-bottom: 16px; }
.info-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-3); margin-bottom: 6px;
}
.info-value { font-size: 13px; line-height: 1.6; color: var(--text); }
.info-badge {
  display: inline-block; padding: 3px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 500; margin: 0 4px 4px 0;
  background: var(--bg-elevated); color: var(--text-2);
  border: 1px solid var(--border);
}
.info-points { list-style: none; counter-reset: pts; }
.info-points li {
  counter-increment: pts;
  padding: 8px 0 8px 32px; position: relative;
  font-size: 13px; line-height: 1.6; color: var(--text);
  border-bottom: 1px solid var(--border);
}
.info-points li:last-child { border-bottom: none; }
.info-points li::before {
  content: counter(pts);
  position: absolute; left: 0; top: 8px;
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent-bg); color: var(--accent);
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.modal-foot {
  padding: 0 24px 20px;
  display: flex; gap: 6px;
}
.modal-foot button {
  flex: 1; padding: 8px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-2); font-size: 12px; font-weight: 500; font-family: var(--font);
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.modal-foot button:hover { background: var(--bg-elevated); }
.modal-foot .btn-primary {
  background: var(--accent); border-color: var(--accent); color: #fff;
}
.modal-foot .btn-primary:hover { background: var(--accent-hover); }

/* === TOAST === */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--bg-elevated); color: var(--text);
  padding: 10px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--border);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 9999; opacity: 0;
  transition: transform 0.3s cubic-bezier(0.2,0,0,1), opacity 0.3s ease;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* === BACK TO TOP === */
.back-top {
  position: fixed; bottom: 32px; right: 32px;
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg-panel);
  color: var(--text-3); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  opacity: 0; transform: translateY(8px);
  transition: all 0.25s ease; z-index: 50;
}
.back-top.visible { opacity: 1; transform: translateY(0); }
.back-top:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* === EMPTY STATE === */
.empty-state {
  text-align: center; padding: 80px 20px; color: var(--text-3);
}
.empty-state svg { margin-bottom: 16px; color: var(--text-3); opacity: 0.4; }
.empty-state .title { font-size: 15px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
.empty-state .desc { font-size: 13px; }

/* === RESPONSIVE === */
@media (max-width: 700px) {
  .header-inner, .toolbar, .content { padding-left: 16px; padding-right: 16px; }
  .grid { grid-template-columns: 1fr; }
  .search-wrap { max-width: none; flex: 1; }
  .toolbar-right { width: 100%; justify-content: space-between; }
  .card-actions { flex-wrap: wrap; }
}

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-dot"></div>
      Pulse <span>素材雷达</span>
    </div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="搜索消息…" autocomplete="off">
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="stats-bar" id="statsBar">
    <span class="stat-item">今日新增 <strong id="statToday">0</strong></span>
    <span class="stat-item">高价值 <strong id="statHigh">0</strong></span>
    <span class="stat-item">未处理 <strong id="statUnprocessed">0</strong></span>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="AI"><span class="dot" style="background:var(--accent)"></span>AI</button>
    <button class="filter-btn" data-filter="公司"><span class="dot" style="background:var(--orange)"></span>公司</button>
    <button class="filter-btn" data-filter="金融"><span class="dot" style="background:var(--green)"></span>金融</button>
    <button class="filter-btn" data-filter="科技"><span class="dot" style="background:var(--purple)"></span>科技</button>
    </div>
  <div class="toolbar-right">
    <div class="count"><strong id="totalCount">0</strong> 条</div>
    <div class="sort-group" id="sortGroup">
      <button class="sort-btn" data-sort="unprocessed">未处理优先</button>
      <button class="sort-btn active" data-sort="time">最新</button>
      <button class="sort-btn" data-sort="hot">热度</button>
      <button class="sort-btn" data-sort="value">价值</button>
    </div>
  </div>
  </div>
</div>

<main class="content">
  <div class="grid" id="skeletons">
    <div class="skel-card skeleton"><div class="skel-row"><div class="skel-circle skeleton"></div><div class="skel-lines"><div class="skel-line w60 skeleton"></div><div class="skel-line w90 skeleton"></div></div></div><div class="skel-line w75 skeleton"></div><div class="skel-line w90 skeleton"></div><div class="skel-line w40 skeleton"></div></div>
    <div class="skel-card skeleton"><div class="skel-row"><div class="skel-circle skeleton"></div><div class="skel-lines"><div class="skel-line w60 skeleton"></div><div class="skel-line w90 skeleton"></div></div></div><div class="skel-line w75 skeleton"></div><div class="skel-line w90 skeleton"></div><div class="skel-line w40 skeleton"></div></div>
    <div class="skel-card skeleton"><div class="skel-row"><div class="skel-circle skeleton"></div><div class="skel-lines"><div class="skel-line w60 skeleton"></div><div class="skel-line w90 skeleton"></div></div></div><div class="skel-line w75 skeleton"></div><div class="skel-line w90 skeleton"></div><div class="skel-line w40 skeleton"></div></div>
    <div class="skel-card skeleton"><div class="skel-row"><div class="skel-circle skeleton"></div><div class="skel-lines"><div class="skel-line w60 skeleton"></div><div class="skel-line w90 skeleton"></div></div></div><div class="skel-line w75 skeleton"></div><div class="skel-line w90 skeleton"></div><div class="skel-line w40 skeleton"></div></div>
    <div class="skel-card skeleton"><div class="skel-row"><div class="skel-circle skeleton"></div><div class="skel-lines"><div class="skel-line w60 skeleton"></div><div class="skel-line w90 skeleton"></div></div></div><div class="skel-line w75 skeleton"></div><div class="skel-line w90 skeleton"></div><div class="skel-line w40 skeleton"></div></div>
    <div class="skel-card skeleton"><div class="skel-row"><div class="skel-circle skeleton"></div><div class="skel-lines"><div class="skel-line w60 skeleton"></div><div class="skel-line w90 skeleton"></div></div></div><div class="skel-line w75 skeleton"></div><div class="skel-line w90 skeleton"></div><div class="skel-line w40 skeleton"></div></div>
  </div>
  <div class="grid" id="cardGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M8 7h8M8 11h5"/></svg>
    <div class="title">暂无消息</div>
    <div class="desc">换个关键词试试</div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3>关键信息</h3>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button onclick="copyText('info')">复制信息</button>
      <button onclick="copyText('prompt')">复制提示词</button>
      <button class="btn-primary" onclick="generateImage()">生成配图</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="back-top" id="backTop" aria-label="回到顶部">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<script>
// === ICONS (SVG, no emoji) ===
var ICONS = {
  AI: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M6 10v2a6 6 0 0 0 12 0v-2"/><path d="M12 18v4M8 22h8"/></svg>',
  公司: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="8" width="7" height="13" rx="1"/><path d="M6 7h1M6 10h1M6 13h1M17 12h1M17 15h1"/></svg>',
  金融: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
  科技: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9z"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M1 9h3M1 15h3M20 9h3M20 15h3"/></svg>'
};

// === THEME ===
(function() {
  var saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.body.style.setProperty('--bg', saved === 'dark' ? '#08090a' : '#ffffff');
})();

// === STATE ===
var allData = [], currentFilter = 'all', currentSort = 'time';

// === HELPERS ===
function classify(title) {
  var t = (title || '').toLowerCase();
  if (/ai|gpt|claude|gemini|大模型|llm|智能体|openai|anthropic|deepseek/.test(t)) return 'AI';
  if (/公司|苹果|谷歌|微软|meta|腾讯|阿里|字节|小米|华为|三星|coinbase/.test(t)) return '公司';
  if (/金融|银行|股|融资|投资|coin|crypto|bitcoin|利率/.test(t)) return '金融';
  return '科技';
}

function evaluateValue(title, content, views) {
  var score = 0;
  var text = (title + ' ' + content).toLowerCase();
  if (/\d+亿|\$\d+|估值|收入|营收|市值/.test(text)) score += 20;
  if (/苹果|谷歌|微软|meta|openai|anthropic|腾讯|阿里|字节|华为|特斯拉/.test(text)) score += 20;
  if (/gpt|claude|gemini|模型|产品发布|上线/.test(text)) score += 15;
  if (/合作|收购|争议|突破|发布/.test(text)) score += 15;
  if (views >= 1000) score += 15;
  if (score >= 60) return 'high';
  if (score >= 35) return 'mid';
  return 'normal';
}

function parseViews(v) {
  if (typeof v === 'number') return v;
  if (!v) return 0;
  var s = String(v).replace(/,/g, '');
  if (/K$/i.test(s)) return parseFloat(s) * 1000;
  if (/M$/i.test(s)) return parseFloat(s) * 1000000;
  return parseInt(s, 10) || 0;
}

function formatTime(iso) {
  if (!iso) return '';
  var d = new Date(iso), diff = (Date.now() - d) / 1000;
  if (diff < 0) return '刚刚';
  if (diff < 3600) return Math.max(1, Math.floor(diff / 60)) + ' 分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
  if (diff < 172800) return '昨天';
  return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 2200);
}

// === LOAD ===
function loadData() {
  fetch('data.json?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      allData = (data.messages || []).map(function(m) {
        var txt = m.clean_text || m.text || '';
        var title = txt.split(/[。！？\n]/)[0].trim().slice(0, 50);
        var summary = txt.split(/[。！？\n]/).filter(function(s){return s.trim().length > 8;})[0] || txt.slice(0, 80);
        var views = parseViews(m.views);
        return Object.assign({}, m, {
          title: title,
          content: txt,
          summary: summary.trim().slice(0, 80),
          date: m.datetime,
          views: views,
          tag: classify(title + ' ' + txt),
          value: evaluateValue(title, txt, views),
          status: m.status || 'unprocessed'
        });
      });
      renderCards();
    })
    .catch(function() {
      document.getElementById('skeletons').style.display = 'none';
      document.getElementById('emptyState').style.display = '';
    });
}

// === RENDER ===
function renderCards() {
  document.getElementById('skeletons').style.display = 'none';
  var items = allData.slice();
  var q = document.getElementById('searchInput').value.trim().toLowerCase();

  if (currentFilter !== 'all')
    items = items.filter(function(m) { return m.tag === currentFilter; });
  if (q)
    items = items.filter(function(m) {
      return (m.title || '').toLowerCase().indexOf(q) >= 0 ||
             (m.content || '').toLowerCase().indexOf(q) >= 0;
    });

  if (currentSort === 'hot')
    items.sort(function(a, b) { return (b.views || 0) - (a.views || 0); });
  else if (currentSort === 'value')
    items.sort(function(a, b) { var vo = {high:3,mid:2,normal:1}; return (vo[b.value]||0) - (vo[a.value]||0); });
  else if (currentSort === 'unprocessed')
    items.sort(function(a, b) {
      var so = {unprocessed:0,processed:1,image_generated:2,published:3,ignored:4};
      var va = so[a.status]||0, vb = so[b.status]||0;
      if (va !== vb) return va - vb;
      return new Date(b.date) - new Date(a.date);
    });
  else
    items.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });

  document.getElementById('totalCount').textContent = items.length;

  // Update stats
  var today = new Date().toDateString();
  var todayCount = allData.filter(function(m) { return new Date(m.date).toDateString() === today; }).length;
  var highCount = allData.filter(function(m) { return m.value === 'high'; }).length;
  var unprocCount = allData.filter(function(m) { return m.status === 'unprocessed'; }).length;
  document.getElementById('statToday').textContent = todayCount;
  document.getElementById('statHigh').textContent = highCount;
  document.getElementById('statUnprocessed').textContent = unprocCount;

  if (!items.length) {
    document.getElementById('cardGrid').innerHTML = '';
    document.getElementById('emptyState').style.display = '';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';

  var html = '';
  for (var i = 0; i < items.length; i++) {
    var m = items[i], idx = allData.indexOf(m);
    var views = m.views || 0, isHot = views >= 1000;
    var tag = m.tag;
    var tagCls = tag === 'AI' ? 'ai' : tag === '公司' ? 'company' : tag === '金融' ? 'finance' : 'tech';

    html += '<article class="card">'
      + '<div class="card-top">'
      +   '<div class="card-icon ' + tagCls + '">' + (ICONS[tag] || ICONS['科技']) + '</div>'
      +   '<div class="card-header">'
      +     '<span class="card-tag ' + tagCls + '">' + esc(tag) + '</span>'
      +     (m.value === 'high' ? '<span class="hot-badge" style="background:var(--orange-bg);color:var(--orange)">🔥 高价值</span>' : '')
      +     (isHot ? '<span class="hot-badge">HOT</span>' : '')
      +     '<h3 class="card-title">' + esc(m.title || (m.content || '').slice(0, 50)) + '</h3>'
      +     (m.summary ? '<p class="card-summary">' + esc(m.summary) + '</p>' : '')
      +   '</div>'
      + '</div>'
      + '<div class="card-body">'
      +   '<p class="card-excerpt">' + esc((m.content || '').slice(0, 120)) + '</p>'
      + '</div>'
      + '<div class="card-footer">'
      +   '<div class="card-meta">'
      +     '<span>' + formatTime(m.date) + '</span>'
      +     '<span class="views' + (isHot ? ' hot' : '') + '">'
      +       '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
      +       (views >= 1000 ? (views / 1000).toFixed(1) + 'K' : views)
      +     '</span>'
      +   '</div>'
      +   '<div class="card-actions">'
      +     '<button onclick="copySummary(' + idx + ')" title="复制重点">📋 重点</button>'
      +     '<button onclick="copyTitle(' + idx + ')" title="复制标题">📌 标题</button>'
      +     '<button onclick="copyPrompt(' + idx + ')" title="复制提示词">🎨 提示词</button>'
      +     '<button class="btn-accent" onclick="extractInfo(' + idx + ')">提取</button>'
      +   '</div>'
      + '</div>'
      + '</article>';
  }
  document.getElementById('cardGrid').innerHTML = html;
}

// === ACTIONS ===
var currentInfo = null;

function copyFull(i) {
  navigator.clipboard.writeText(allData[i].content || allData[i].title)
    .then(function() { showToast('已复制全文'); });
}

function copySummary(i) {
  var m = allData[i];
  var text = '【重点】' + (m.summary || m.title) + '\n【来源】' + (m.source_channel || '');
  navigator.clipboard.writeText(text)
    .then(function() { showToast('已复制重点'); markProcessed(i); });
}

function copyTitle(i) {
  navigator.clipboard.writeText(allData[i].title || '')
    .then(function() { showToast('已复制标题'); markProcessed(i); });
}

function copyPrompt(i) {
  var m = allData[i];
  var text = '新闻配图，标题：' + m.title
    + '\n\n画面主体：科技新闻场景'
    + '\n背景元素：数字化、数据流、科技元素'
    + '\n风格：科技感、现代新闻视觉、未来感、干净构图、蓝紫色光效'
    + '\n画幅：16:9 横版封面'
    + '\n避免：不要出现真实品牌Logo，不要过多文字，不要杂乱';
  navigator.clipboard.writeText(text)
    .then(function() { showToast('已复制提示词'); markImageGen(i); });
}

function markProcessed(i) {
  if (allData[i]) allData[i].status = 'processed';
}

function markImageGen(i) {
  if (allData[i]) allData[i].status = 'image_generated';
}

function extractInfo(i) {
  var m = allData[i];
  var title = m.title || (m.content || '').slice(0, 60);
  var content = m.content || '';
  var entities = [];
  var p1 = /Anthropic|OpenAI|Meta|Google|Microsoft|Apple|小米|华为|腾讯|阿里|字节|Coinbase|Tesla|Samsung|三星|DeepSeek/gi;
  var p2 = /GPT-[\w.]+|Claude|Gemini|Llama|Sora|DeepSeek/g;
  var m2;
  while ((m2 = p1.exec(content)) !== null) entities.push(m2[0]);
  while ((m2 = p2.exec(content)) !== null) entities.push(m2[0]);
  var points = content.split(/[。！？\n]/).filter(function(s) { return s.trim().length > 10; }).slice(0, 5);
  currentInfo = {
    title: title, tag: m.tag,
    entities: entities.filter(function(v, i, a) { return a.indexOf(v) === i; }),
    points: points, content: content
  };

  var entHtml = '';
  currentInfo.entities.forEach(function(e) { entHtml += '<span class="info-badge">' + esc(e) + '</span>'; });
  var ptsHtml = '';
  points.forEach(function(p) { ptsHtml += '<li>' + esc(p.trim()) + '</li>'; });

  document.getElementById('modalBody').innerHTML =
    '<div class="info-section"><div class="info-label">分类</div><div class="info-value">' + esc(m.tag) + '</div></div>'
    + '<div class="info-section"><div class="info-label">标题</div><div class="info-value">' + esc(title) + '</div></div>'
    + (entHtml ? '<div class="info-section"><div class="info-label">实体</div><div class="info-value">' + entHtml + '</div></div>' : '')
    + '<div class="info-section"><div class="info-label">要点</div><ol class="info-points">' + ptsHtml + '</ol></div>';

  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

function copyText(type) {
  if (!currentInfo) return;
  var text;
  if (type === 'info') {
    text = '主体: ' + currentInfo.tag + '\n标题: ' + currentInfo.title
      + '\n实体: ' + currentInfo.entities.join(', ')
      + '\n要点:\n' + currentInfo.points.map(function(p, i) { return (i + 1) + '. ' + p.trim(); }).join('\n');
  } else {
    text = '请生成一张科技新闻配图：\n标题：' + currentInfo.title
      + '\n关键词：' + currentInfo.entities.join(', ')
      + '\n风格：现代简约、科技感、深色背景';
  }
  navigator.clipboard.writeText(text)
    .then(function() { showToast(type === 'info' ? '已复制信息' : '已复制提示词'); });
}

function generateImage() {
  if (!currentInfo) return;
  window.open('https://chat.openai.com/?model=gpt-4&prompt=' + encodeURIComponent(
    '请根据以下描述生成一张配图：科技新闻配图，标题：' + currentInfo.title + '，关键词：' + currentInfo.entities.join(', ')
  ), '_blank');
  showToast('正在打开生图…');
}

// === FILTERS ===
document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderCards();
  });
});

// === SORT ===
document.querySelectorAll('.sort-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.sort-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    renderCards();
  });
});

// === SEARCH ===
document.getElementById('searchInput').addEventListener('input', renderCards);

// === BACK TO TOP ===
var backTop = document.getElementById('backTop');
window.addEventListener('scroll', function() { backTop.classList.toggle('visible', window.scrollY > 400); });
backTop.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });

// === INIT ===
loadData();
</script>
</body>
</html>
