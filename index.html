<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>频道监控</title>
    <style>
        /* Open Design - Modern Minimal (Linear/Vercel style) */
        :root {
            --bg: oklch(99% 0.002 240);
            --surface: oklch(100% 0 0);
            --fg: oklch(18% 0.012 250);
            --muted: oklch(54% 0.012 250);
            --border: oklch(92% 0.005 250);
            --accent: oklch(58% 0.18 255);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Sticky frosted nav */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
        }

        .header-content {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--fg);
        }

        .search-bar {
            display: flex;
            gap: 8px;
            flex: 1;
            max-width: 400px;
        }

        .search-bar input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--surface);
            color: var(--fg);
            transition: border-color 0.15s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .search-bar input::placeholder {
            color: var(--muted);
        }

        .btn {
            padding: 8px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--fg);
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn:hover {
            background: var(--bg);
            border-color: var(--muted);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        /* Filters */
        .filters {
            max-width: 960px;
            margin: 24px auto 0;
            padding: 0 24px;
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .filter-btn:hover {
            border-color: var(--muted);
            color: var(--fg);
        }

        .filter-btn.active {
            background: var(--fg);
            border-color: var(--fg);
            color: var(--bg);
        }

        /* Messages */
        .messages {
            max-width: 960px;
            margin: 24px auto;
            padding: 0 24px;
        }

        .message-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 12px;
            transition: border-color 0.15s;
        }

        .message-card:hover {
            border-color: var(--muted);
        }

        .message-date {
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            margin-bottom: 8px;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.6;
            color: var(--fg);
            margin-bottom: 16px;
        }

        .message-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .views {
            font-size: 13px;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            color: var(--fg);
            cursor: pointer;
            transition: all 0.15s;
        }

        .action-btn:hover {
            background: var(--bg);
            border-color: var(--muted);
        }

        .action-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .action-btn.primary:hover {
            opacity: 0.9;
        }

        .empty {
            text-align: center;
            padding: 60px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            header {
                padding: 12px 16px;
            }

            .header-content {
                flex-direction: column;
                align-items: stretch;
            }

            .search-bar {
                max-width: none;
            }

            .filters, .messages {
                padding: 0 16px;
            }

            .actions {
                flex-direction: column;
                width: 100%;
            }

            .action-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>频道监控</h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="搜索消息...">
                <button class="btn" onclick="location.reload()">刷新</button>
            </div>
        </div>
    </header>

    <div class="filters">
        <button class="filter-btn active" onclick="filterMessages('all', this)">全部</button>
        <button class="filter-btn" onclick="filterMessages('zaihuapd', this)">在花频道</button>
        <button class="filter-btn" onclick="filterMessages('xhqcankao', this)">新环球参考</button>
    </div>

    <div class="messages" id="messages"></div>

    <script>
        let allMessages = [];
        let currentFilter = 'all';

        async function loadData() {
            try {
                const response = await fetch('data.json?' + Date.now());
                const data = await response.json();
                allMessages = data.messages || [];
                renderMessages();
            } catch (error) {
                document.getElementById('messages').innerHTML = '<div class="empty">暂无数据</div>';
            }
        }

        function renderMessages() {
            const container = document.getElementById('messages');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allMessages;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(m => m.channel === currentFilter);
            }
            
            if (searchTerm) {
                filtered = filtered.filter(m => 
                    (m.text || '').toLowerCase().includes(searchTerm) || 
                    (m.clean_text || '').toLowerCase().includes(searchTerm)
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty">暂无消息</div>';
                return;
            }

            container.innerHTML = filtered.slice(0, 50).map((msg, index) => `
                <div class="message-card">
                    <div class="message-date">${formatDate(msg.datetime)}</div>
                    <div class="message-text">${msg.clean_text || msg.text || ''}</div>
                    <div class="message-meta">
                        <div class="views">${msg.views || 'N/A'} 次浏览</div>
                        <div class="actions">
                            <button class="action-btn" onclick="copyText(${index})">复制全文</button>
                            <button class="action-btn primary" onclick="generateImage(${index})">生成配图</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', { 
                year: 'numeric',
                month: '2-digit', 
                day: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        function filterMessages(channel, btn) {
            currentFilter = channel;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMessages();
        }

        function copyText(index) {
            const msg = allMessages[index];
            const text = msg.clean_text || msg.text || '';
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制全文');
            });
        }

        function generateImage(index) {
            const msg = allMessages[index];
            const text = (msg.clean_text || msg.text || '').substring(0, 100);
            window.open(`https://chatgpt.com/?model=gpt-4&prompt=${encodeURIComponent('为以下内容生成配图：' + text)}`, '_blank');
        }

        document.getElementById('searchInput').addEventListener('input', renderMessages);
        loadData();
    </script>
</body>
</html>
