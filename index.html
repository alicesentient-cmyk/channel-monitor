<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>频道监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        header {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { color: #333; font-size: 24px; margin-bottom: 15px; }
        .search-bar { display: flex; gap: 10px; }
        .search-bar input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
        }
        .search-bar input:focus { outline: none; border-color: #667eea; }
        .search-bar button {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn.active, .filter-btn:hover { background: white; color: #667eea; }
        .message-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .message-date { color: #999; font-size: 14px; margin-bottom: 10px; }
        .message-text { color: #333; font-size: 16px; line-height: 1.6; margin-bottom: 15px; }
        .message-meta { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .views { color: #999; font-size: 14px; }
        .actions { display: flex; gap: 10px; }
        .action-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .action-btn:hover { background: #667eea; color: white; }
        .action-btn.generate { background: #667eea; color: white; }
        .empty { text-align: center; padding: 40px; background: white; border-radius: 16px; color: #999; }
        @media (max-width: 600px) {
            .search-bar { flex-direction: column; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📰 频道监控</h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="搜索消息...">
                <button onclick="location.reload()">🔄 刷新</button>
            </div>
        </header>
        <div class="filters">
            <button class="filter-btn active" onclick="filterMessages('all')">全部</button>
            <button class="filter-btn" onclick="filterMessages('zaihuapd')">在花频道</button>
            <button class="filter-btn" onclick="filterMessages('xhqcankao')">新环球参考</button>
        </div>
        <div id="messages"></div>
    </div>
    <script>
        let allMessages = [];
        let currentFilter = 'all';

        async function loadData() {
            try {
                const response = await fetch('data.json?' + Date.now());
                const data = await response.json();
                allMessages = data.messages || [];
                renderMessages();
            } catch (error) {
                document.getElementById('messages').innerHTML = '<div class="empty">暂无数据</div>';
            }
        }

        function renderMessages() {
            const container = document.getElementById('messages');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allMessages;
            if (currentFilter !== 'all') {
                filtered = filtered.filter(m => m.channel === currentFilter);
            }
            if (searchTerm) {
                filtered = filtered.filter(m => 
                    (m.text || '').toLowerCase().includes(searchTerm) || 
                    (m.clean_text || '').toLowerCase().includes(searchTerm)
                );
            }
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty">📭 暂无消息</div>';
                return;
            }
            container.innerHTML = filtered.slice(0, 50).map((msg, index) => `
                <div class="message-card">
                    <div class="message-date">📅 ${formatDate(msg.datetime)}</div>
                    <div class="message-text">${msg.clean_text || msg.text || ''}</div>
                    <div class="message-meta">
                        <div class="views">👁 ${msg.views || 'N/A'}</div>
                        <div class="actions">
                            <button class="action-btn" onclick="copyText(${index})">📋 复制全文</button>
                            <button class="action-btn generate" onclick="generateImage(${index})">🎨 生成配图</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function filterMessages(channel) {
            currentFilter = channel;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderMessages();
        }

        function copyText(index) {
            const msg = allMessages[index];
            const text = msg.clean_text || msg.text || '';
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ 已复制全文！');
            });
        }

        function generateImage(index) {
            const msg = allMessages[index];
            const text = (msg.clean_text || msg.text || '').substring(0, 100);
            window.open(`https://chatgpt.com/?model=gpt-4&prompt=${encodeURIComponent('为以下内容生成配图：' + text)}`, '_blank');
        }

        document.getElementById('searchInput').addEventListener('input', renderMessages);
        loadData();
    </script>
</body>
</html>
