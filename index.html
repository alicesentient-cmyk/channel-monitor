<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>频道监控</title>
    <style>
        :root {
            --bg: oklch(99% 0.002 240);
            --surface: oklch(100% 0 0);
            --fg: oklch(18% 0.012 250);
            --muted: oklch(54% 0.012 250);
            --border: oklch(92% 0.005 250);
            --accent: oklch(58% 0.18 255);
            --success: oklch(58% 0.16 145);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
        }
        .header-content {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
        .search-bar { display: flex; gap: 8px; flex: 1; max-width: 400px; }
        .search-bar input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--surface);
            color: var(--fg);
        }
        .search-bar input:focus { outline: none; border-color: var(--accent); }
        .search-bar input::placeholder { color: var(--muted); }
        .btn {
            padding: 8px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--fg);
            cursor: pointer;
        }
        .btn:hover { background: var(--bg); border-color: var(--muted); }
        .messages { max-width: 960px; margin: 24px auto; padding: 0 24px; }
        .message-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 12px;
        }
        .message-card:hover { border-color: var(--muted); }
        .message-date { font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
        .message-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
        .message-text { font-size: 15px; line-height: 1.6; margin-bottom: 16px; color: var(--muted); }
        .message-meta { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .views { font-size: 13px; color: var(--muted); }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .action-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            color: var(--fg);
            cursor: pointer;
        }
        .action-btn:hover { background: var(--bg); border-color: var(--muted); }
        .action-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
        .action-btn.extract { background: var(--success); border-color: var(--success); color: white; }
        .key-info-panel { display: none; margin-top: 16px; padding: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; }
        .key-info-panel.show { display: block; }
        .key-info-title { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 12px; }
        .key-info-content { font-size: 14px; line-height: 1.8; white-space: pre-wrap; }
        .key-info-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .empty { text-align: center; padding: 60px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); }
        @media (max-width: 640px) {
            header { padding: 12px 16px; }
            .header-content { flex-direction: column; align-items: stretch; }
            .search-bar { max-width: none; }
            .messages { padding: 0 16px; }
            .actions, .key-info-actions { flex-direction: column; }
            .action-btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>频道监控</h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="搜索消息...">
                <button class="btn" onclick="location.reload()">刷新</button>
            </div>
        </div>
    </header>
    <div class="messages" id="messages"></div>
    <script>
        let allMessages = [];
        let extractedInfo = {};

        async function loadData() {
            try {
                const response = await fetch('data.json?' + Date.now());
                const data = await response.json();
                allMessages = data.messages || [];
                renderMessages();
            } catch (error) {
                document.getElementById('messages').innerHTML = '<div class="empty">暂无数据</div>';
            }
        }

        function extractKeyInfo(text) {
            const info = { title: '', subject: '', keyPoints: [], entities: [] };
            const sentences = text.split(/[。！？.!?]/).filter(s => s.trim());
            if (sentences.length > 0) info.title = sentences[0].trim().substring(0, 50);
            
            const patterns = [
                /(?:OpenAI|Google|Microsoft|Apple|Meta|Tesla|Nvidia|Anthropic|华为|小米|腾讯|阿里|字节|百度)/gi,
                /(?:GPT-\d|Claude|Gemini|Llama|Sora|Midjourney|Stable Diffusion)/gi
            ];
            patterns.forEach(p => { const m = text.match(p); if (m) info.entities.push(...m); });
            info.entities = [...new Set(info.entities)];
            
            const kp = [/(?:提升|降低|增加|减少|发布|推出|更新|升级|改进|优化)[^，。]{5,30}/g, /(?:首次|突破|创新|领先|最大|最快|最新)[^，。]{5,20}/g];
            kp.forEach(p => { const m = text.match(p); if (m) info.keyPoints.push(...m.slice(0, 3)); });
            
            if (info.entities.length > 0) info.subject = info.entities[0];
            return info;
        }

        function formatKeyInfo(info) {
            let r = '';
            if (info.subject) r += `主体：${info.subject}\n`;
            if (info.title) r += `标题：${info.title}\n`;
            if (info.entities.length) r += `实体：${info.entities.join('、')}\n`;
            if (info.keyPoints.length) { r += `要点：\n`; info.keyPoints.forEach((p, i) => r += `  ${i+1}. ${p}\n`); }
            return r.trim();
        }

        function generateImagePrompt(info) {
            let p = info.subject ? `${info.subject}科技新闻` : '科技新闻';
            if (info.keyPoints.length) p += `，${info.keyPoints[0]}`;
            return p + '，科技感，现代风格，新闻配图';
        }

        function extractTitle(text) {
            // 提取文章标题（第一句或前30字）
            const firstSentence = text.split(/[。！？.!?]/)[0].trim();
            return firstSentence.substring(0, 40);
        }

        function renderMessages() {
            const container = document.getElementById('messages');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allMessages;
            
            if (searchTerm) {
                filtered = filtered.filter(m => (m.text||'').toLowerCase().includes(searchTerm) || (m.clean_text||'').toLowerCase().includes(searchTerm));
            }
            
            if (!filtered.length) { container.innerHTML = '<div class="empty">暂无消息</div>'; return; }
            
            container.innerHTML = filtered.slice(0, 50).map((msg, i) => {
                const text = msg.clean_text || msg.text || '';
                const title = extractTitle(text);
                const content = text.length > 100 ? text.substring(0, 100) + '...' : text;
                
                return `
                <div class="message-card" id="card-${i}">
                    <div class="message-date">${formatDate(msg.datetime)}</div>
                    <div class="message-title">${title}</div>
                    <div class="message-text">${content}</div>
                    <div class="message-meta">
                        <div class="views">${msg.views || 'N/A'} 次浏览</div>
                        <div class="actions">
                            <button class="action-btn" onclick="copyText(${i})">复制全文</button>
                            <button class="action-btn extract" onclick="extractAndShow(${i})">提取关键信息</button>
                        </div>
                    </div>
                    <div class="key-info-panel" id="info-${i}">
                        <div class="key-info-title">关键信息提取结果</div>
                        <div class="key-info-content" id="info-content-${i}"></div>
                        <div class="key-info-actions">
                            <button class="action-btn" onclick="copyKeyInfo(${i})">复制关键信息</button>
                            <button class="action-btn" onclick="copyPrompt(${i})">复制生图提示词</button>
                            <button class="action-btn primary" onclick="generateWithKeyInfo(${i})">用关键信息生成配图</button>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function formatDate(d) {
            if (!d) return 'N/A';
            return new Date(d).toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function copyText(i) {
            const t = allMessages[i].clean_text || allMessages[i].text || '';
            navigator.clipboard.writeText(t).then(() => alert('已复制全文'));
        }

        function extractAndShow(i) {
            const text = allMessages[i].clean_text || allMessages[i].text || '';
            const info = extractKeyInfo(text);
            extractedInfo[i] = info;
            document.getElementById(`info-content-${i}`).textContent = formatKeyInfo(info);
            document.getElementById(`info-${i}`).classList.add('show');
        }

        function copyKeyInfo(i) {
            if (extractedInfo[i]) navigator.clipboard.writeText(formatKeyInfo(extractedInfo[i])).then(() => alert('已复制关键信息'));
        }

        function copyPrompt(i) {
            if (extractedInfo[i]) navigator.clipboard.writeText(generateImagePrompt(extractedInfo[i])).then(() => alert('已复制生图提示词'));
        }

        function generateWithKeyInfo(i) {
            if (extractedInfo[i]) window.open(`https://chatgpt.com/?model=gpt-4&prompt=${encodeURIComponent('请为以下内容生成一张配图：' + generateImagePrompt(extractedInfo[i]))}`, '_blank');
        }

        document.getElementById('searchInput').addEventListener('input', renderMessages);
        loadData();
    </script>
</body>
</html>
